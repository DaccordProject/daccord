<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <title>$GODOT_PROJECT_NAME</title>
    $GODOT_HEAD_INCLUDE
    <style>
      * {
        margin: 0;
        padding: 0;
        border: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #1e1f22;
        overflow: hidden;
      }

      #canvas {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      #status {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #1e1f22;
        color: #dcddde;
        font-family: sans-serif;
      }

      #status-splash {
        max-width: 200px;
        max-height: 200px;
        margin-bottom: 24px;
      }

      #status-progress-wrap {
        width: 240px;
        height: 4px;
        background: #2b2d31;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 12px;
      }

      #status-progress-inner {
        height: 100%;
        background: #5865f2;
        width: 0%;
        transition: width 0.2s ease;
      }

      #status-indeterminate {
        display: none;
        width: 240px;
        height: 4px;
        background: #2b2d31;
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 12px;
      }

      #status-indeterminate::after {
        content: "";
        display: block;
        height: 100%;
        width: 40%;
        background: #5865f2;
        border-radius: 2px;
        animation: indeterminate 1.4s ease infinite;
      }

      @keyframes indeterminate {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }

      #status-notice {
        color: #72767d;
        font-size: 0.8em;
        text-align: center;
        padding: 0 24px;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas">
      Your browser does not support the HTML5 canvas element.
    </canvas>

    <div id="status">
      <img
        id="status-splash"
        src="$GODOT_SPLASH"
        alt=""
        draggable="false"
        onerror="this.style.display='none'"
      />
      <div id="status-progress-wrap">
        <div id="status-progress-inner"></div>
      </div>
      <div id="status-indeterminate"></div>
      <div id="status-notice"></div>
    </div>

    <!-- Unregister any leftover COOP/COEP service worker from older builds. -->
    <script>
      (function () {
        if (!("serviceWorker" in navigator)) return;
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        });
      })();
    </script>

    <!-- livekit-client.js + godot-livekit-web.js must load before the Godot
         WASM module so that GodotLiveKit.createRoom() works at runtime. -->
    <script src="livekit-client.umd.min.js"></script>
    <script src="godot-livekit-web.js"></script>
    <script src="$GODOT_URL"></script>
    <script>
      /* globals Engine */

      const GODOT_CONFIG = $GODOT_CONFIG;
      GODOT_CONFIG.canvas = document.getElementById("canvas");

      const statusEl = document.getElementById("status");
      const progressWrap = document.getElementById("status-progress-wrap");
      const progressInner = document.getElementById("status-progress-inner");
      const indeterminate = document.getElementById("status-indeterminate");
      const noticeEl = document.getElementById("status-notice");

      function setMode(mode) {
        switch (mode) {
          case "progress":
            statusEl.style.display = "flex";
            progressWrap.style.display = "block";
            indeterminate.style.display = "none";
            break;
          case "indeterminate":
            statusEl.style.display = "flex";
            progressWrap.style.display = "none";
            indeterminate.style.display = "block";
            break;
          case "hidden":
            statusEl.style.display = "none";
            break;
        }
      }

      setMode("progress");

      const engine = new Engine(GODOT_CONFIG);

      engine
        .startGame({
          onProgress(current, total) {
            if (total > 0) {
              progressInner.style.width =
                ((current / total) * 100).toFixed(1) + "%";
              if (current === total) {
                setMode("indeterminate");
              }
            }
          },
        })
        .then(() => {
          setMode("hidden");
        })
        .catch((err) => {
          noticeEl.textContent = err.message || String(err);
          setMode("indeterminate");
          console.error(err);
        });
    </script>
  </body>
</html>
