name: Release

on:
  push:
    tags:
      - "v*"

env:
  GODOT_VERSION: "4.5.0"
  GODOTLITE_TAG: "v4.5"
  GUT_VERSION: "9.5.0"
  LUA_GDEXT_VERSION: "0.7.0"

permissions:
  contents: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  build:
    name: Build ${{ matrix.platform }}
    needs: ci
    runs-on: ${{ matrix.os }}
    environment: default
    strategy:
      matrix:
        include:
          - platform: linux
            preset: Linux
            artifact: daccord-linux-x86_64
            extension: x86_64
            os: ubuntu-latest
          - platform: linux-arm64
            preset: "Linux ARM64"
            artifact: daccord-linux-arm64
            extension: arm64
            os: ubuntu-latest
          - platform: windows
            preset: Windows
            artifact: daccord-windows-x86_64
            extension: exe
            os: ubuntu-latest
          - platform: macos
            preset: macOS
            artifact: daccord-macos
            extension: zip
            os: macos-latest
          - platform: android
            preset: Android
            artifact: daccord-android-arm64
            extension: apk
            os: ubuntu-latest
          - platform: web
            preset: Web
            artifact: daccord-web
            extension: zip
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PROJECT_VER=$(grep 'config/version=' project.godot | sed 's/.*="//' | sed 's/"//')
          if [ "$TAG" != "$PROJECT_VER" ]; then
            echo "::error::Tag v$TAG does not match project.godot version $PROJECT_VER"
            exit 1
          fi

      - name: Install audio libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libasound2-dev libpulse-dev libopus-dev libpipewire-0.3-dev

      - name: Set up Java JDK (Android)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK (Android)
        if: matrix.platform == 'android'
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Cache Android SDK components
        if: matrix.platform == 'android'
        id: android-sdk-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/platform-tools
            ${{ env.ANDROID_HOME }}/build-tools/34.0.0
            ${{ env.ANDROID_HOME }}/platforms/android-34
            ${{ env.ANDROID_HOME }}/ndk/23.2.8568313
          key: android-sdk-34-ndk-23.2.8568313

      - name: Install Android SDK components (Android)
        if: matrix.platform == 'android' && steps.android-sdk-cache.outputs.cache-hit != 'true'
        run: |
          sdkmanager --install "platform-tools" "build-tools;34.0.0" "platforms;android-34" "ndk;23.2.8568313"

      - name: Set Android SDK env vars
        if: matrix.platform == 'android'
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/23.2.8568313" >> "$GITHUB_ENV"

      - name: Decode Android keystore
        if: matrix.platform == 'android' && env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Generate debug keystore (Android, no release key)
        if: matrix.platform == 'android' && env.ANDROID_KEYSTORE_BASE64 == ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          keytool -genkeypair -v \
            -keystore "$RUNNER_TEMP/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/debug.keystore" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_USER=androiddebugkey" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=android" >> "$GITHUB_ENV"

      - name: Cache GUT
        uses: actions/cache@v4
        with:
          path: addons/gut
          key: gut-${{ env.GUT_VERSION }}

      - name: Install GUT
        run: |
          if [ ! -d addons/gut ]; then
            curl -sL https://github.com/bitwes/Gut/archive/refs/tags/v${GUT_VERSION}.tar.gz -o /tmp/gut.tar.gz
            tar xzf /tmp/gut.tar.gz -C /tmp
            cp -r /tmp/Gut-${GUT_VERSION}/addons/gut addons/gut
            rm -rf /tmp/gut.tar.gz /tmp/Gut-${GUT_VERSION}
          fi


      - name: Install godot-livekit addon (latest release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Downloading godot-livekit addon (latest release)..."
          TMPDIR=$(mktemp -d)
          gh release download --repo NodotProject/godot-livekit \
            --pattern "godot-livekit-release.zip" --dir "$TMPDIR"
          unzip -o "$TMPDIR/godot-livekit-release.zip" -d "$TMPDIR/extracted"
          if [ ! -d "$TMPDIR/extracted/addons/godot-livekit" ]; then
            echo "::error::godot-livekit addon not found in release asset"
            exit 1
          fi
          rm -rf addons/godot-livekit
          cp -R "$TMPDIR/extracted/addons/godot-livekit" addons/godot-livekit
          rm -rf "$TMPDIR"
          echo "godot-livekit addon installed from latest release."

      - name: Cache Lua GDExtension
        uses: actions/cache@v4
        with:
          path: addons/lua-gdextension
          key: lua-gdextension-lua-${{ env.LUA_GDEXT_VERSION }}

      - name: Install Lua GDExtension
        run: |
          if [ ! -d addons/lua-gdextension ]; then
            TMPDIR=$(mktemp -d)
            gh release download "$LUA_GDEXT_VERSION" --repo gilzoide/lua-gdextension \
              --pattern "lua-gdextension.zip" --dir "$TMPDIR"
            unzip -o "$TMPDIR/lua-gdextension.zip" -d "$TMPDIR/extracted"
            cp -R "$TMPDIR/extracted/addons/lua-gdextension" addons/lua-gdextension
            rm -rf "$TMPDIR"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Remove godot-livekit if platform binary missing
        run: |
          # Godot crashes on macOS (NSException) if a GDExtension references
          # a missing dylib. Safest fix: remove the extension entirely.
          GDEXT="addons/godot-livekit/godot-livekit.gdextension"
          if [ ! -f "$GDEXT" ]; then
            echo "No godot-livekit GDExtension found, skipping."
            exit 0
          fi
          case "${{ matrix.platform }}" in
            linux)       LIB="addons/godot-livekit/bin/libgodot-livekit.linux.x86_64.so" ;;
            linux-arm64) LIB="addons/godot-livekit/bin/libgodot-livekit.linux.arm64.so" ;;
            windows)     LIB="addons/godot-livekit/bin/libgodot-livekit.windows.x86_64.dll" ;;
            macos)       LIB="addons/godot-livekit/bin/libgodot-livekit.macos.arm64.dylib" ;;
            android)     LIB="addons/godot-livekit/bin/libgodot-livekit.android.arm64.so" ;;
            web)         LIB="addons/godot-livekit/bin/libgodot-livekit.web.wasm32.wasm" ;;
          esac
          if [ ! -f "$LIB" ]; then
            echo "::warning::godot-livekit binary $LIB not found — removing GDExtension to prevent crash"
            rm -f "$GDEXT" "$GDEXT.uid"
          else
            echo "godot-livekit binary found: $LIB"
          fi

      - name: Stash macOS godot-livekit dylibs to prevent editor crash
        if: matrix.platform == 'macos'
        run: |
          # The LiveKit C++ SDK triggers AVFoundation camera device enumeration
          # on load, which crashes with "Pure virtual function called!" on macOS
          # 14+ headless runners. Rather than patching the Godot editor's
          # Info.plist (fragile), we stash the dylibs so the editor never loads
          # them, then inject them into the exported .app afterward.
          STASH="$RUNNER_TEMP/livekit_dylibs"
          mkdir -p "$STASH"
          moved=0
          # Stash top-level dylibs (the GDExtension binaries)
          for f in addons/godot-livekit/bin/*.dylib; do
            [ -f "$f" ] || continue
            mv "$f" "$STASH/"
            echo "  Stashed $(basename "$f")"
            moved=$((moved + 1))
          done
          # Stash arch-specific subdirectory dylibs (liblivekit, liblivekit_ffi)
          for subdir in addons/godot-livekit/bin/macos-*/; do
            [ -d "$subdir" ] || continue
            dirname=$(basename "$subdir")
            mkdir -p "$STASH/$dirname"
            for f in "$subdir"*.dylib; do
              [ -f "$f" ] || continue
              mv "$f" "$STASH/$dirname/"
              echo "  Stashed $dirname/$(basename "$f")"
              moved=$((moved + 1))
            done
          done
          if [ "$moved" -gt 0 ]; then
            echo "LIVEKIT_DYLIB_STASH=$STASH" >> "$GITHUB_ENV"
            echo "Stashed $moved macOS dylibs — will inject post-export"
          else
            echo "No macOS dylibs found to stash"
          fi

      - name: Stash macOS lua-gdextension dylibs to prevent editor crash
        if: matrix.platform == 'macos'
        run: |
          # lua-gdextension crashes (signal 11) when loaded by the headless
          # Godot editor on macOS during the autoload creation phase.
          # Same fix as godot-livekit: stash dylibs, inject post-export.
          STASH="$RUNNER_TEMP/lua_dylibs"
          mkdir -p "$STASH"
          moved=0
          for f in addons/lua-gdextension/build/*.dylib; do
            [ -f "$f" ] || continue
            mv "$f" "$STASH/"
            echo "  Stashed $(basename "$f")"
            moved=$((moved + 1))
          done
          if [ "$moved" -gt 0 ]; then
            echo "LUA_DYLIB_STASH=$STASH" >> "$GITHUB_ENV"
            echo "Stashed $moved lua-gdextension macOS dylibs — will inject post-export"
          else
            echo "No lua-gdextension macOS dylibs found to stash"
          fi

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Cache Godot import
        uses: actions/cache@v4
        with:
          path: .godot/imported
          key: godot-import-${{ env.GODOT_VERSION }}-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: |
            godot-import-${{ env.GODOT_VERSION }}-${{ matrix.platform }}-

      - name: Import project
        run: godot --headless --import . || true
        timeout-minutes: 2

      - name: Inject Sentry DSN
        if: env.SENTRY_DSN != ''
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          sed -i.bak 's|config/dsn="[^"]*"|config/dsn="'"$SENTRY_DSN"'"|' project.godot
          rm -f project.godot.bak

      - name: Download GodotLite template
        if: matrix.platform != 'linux-arm64' && matrix.platform != 'android' && matrix.platform != 'web'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/templates
          case "${{ matrix.platform }}" in
            linux)
              ASSET="godotlite-${GODOTLITE_TAG}-linux-x86_64"
              DEST="dist/templates/godot.linuxbsd.template_release.x86_64"
              ;;
            windows)
              ASSET="godotlite-${GODOTLITE_TAG}-windows-x86_64.exe"
              DEST="dist/templates/godot.windows.template_release.x86_64.exe"
              ;;
            macos)
              ASSET="godotlite-${GODOTLITE_TAG}-macos-universal"
              DEST="dist/templates/godot.macos.template_release.universal"
              # Download the GodotLite release asset (a zip containing macos_template.app/)
              gh release download "${GODOTLITE_TAG}" \
                --repo NodotProject/GodotLite \
                --pattern "${ASSET}" \
                --dir /tmp/godotlite_dl
              # The asset is a zip — extract the universal binary from it
              GLDIR=$(mktemp -d)
              unzip -o "/tmp/godotlite_dl/${ASSET}" -d "$GLDIR"
              LITE_BIN="$GLDIR/macos_template.app/Contents/MacOS/godot_macos_release.universal"
              # Use stock Godot template (has proper Info.plist with $binary/$name placeholders)
              # and replace only the binary with the GodotLite one
              # Godot's template dir uses major.minor.status (e.g. "4.5.stable"), dropping the patch version
              GODOT_TPL_VERSION="${GODOT_VERSION%.*}"
              STOCK_TPL="$HOME/Library/Application Support/Godot/export_templates/${GODOT_TPL_VERSION}.stable/macos.zip"
              TPLDIR=$(mktemp -d)
              unzip -o "$STOCK_TPL" -d "$TPLDIR"
              cp "$LITE_BIN" "$TPLDIR/macos_template.app/Contents/MacOS/godot_macos_release.universal"
              chmod +x "$TPLDIR/macos_template.app/Contents/MacOS/godot_macos_release.universal"
              # Add camera key so the exported app doesn't crash from LiveKit's
              # AVFoundation device enumeration on macOS 14+
              TPL_PLIST="$TPLDIR/macos_template.app/Contents/Info.plist"
              if [ -f "$TPL_PLIST" ]; then
                /usr/libexec/PlistBuddy -c "Add :NSCameraUseContinuityCameraDeviceType bool true" "$TPL_PLIST" 2>/dev/null || true
              fi
              cd "$TPLDIR" && zip -r "$GITHUB_WORKSPACE/${DEST}" macos_template.app && cd "$GITHUB_WORKSPACE"
              rm -rf "$TPLDIR" "$GLDIR" /tmp/godotlite_dl
              echo "GodotLite macOS template installed: ${DEST} ($(du -h "${DEST}" | cut -f1))"
              ;;
          esac
          # For non-macOS platforms, move and chmod the downloaded binary
          if [ "${{ matrix.platform }}" != "macos" ]; then
            gh release download "${GODOTLITE_TAG}" \
              --repo NodotProject/GodotLite \
              --pattern "${ASSET}" \
              --dir dist/templates
            mv "dist/templates/${ASSET}" "${DEST}"
            chmod +x "${DEST}"
            echo "GodotLite template installed: ${DEST} ($(du -h "${DEST}" | cut -f1))"
          fi

      - name: Clear missing custom templates
        run: |
          # If a custom template path is set but the file doesn't exist,
          # clear it so Godot falls back to stock templates.
          while IFS= read -r line; do
            if [[ "$line" =~ custom_template/release=\"res://(.+)\" ]]; then
              TEMPLATE_PATH="${BASH_REMATCH[1]}"
              if [ -n "$TEMPLATE_PATH" ] && [ ! -f "$TEMPLATE_PATH" ]; then
                echo "Custom template not found: $TEMPLATE_PATH — clearing for stock fallback"
                sed -i.bak "s|custom_template/release=\"res://$TEMPLATE_PATH\"|custom_template/release=\"\"|" export_presets.cfg
              fi
            fi
          done < export_presets.cfg
          rm -f export_presets.cfg.bak

      - name: Configure Godot Android SDK path
        if: matrix.platform == 'android'
        run: |
          # Write Godot editor settings so the export knows where Android SDK/NDK live
          SETTINGS_DIR="$HOME/.config/godot"
          mkdir -p "$SETTINGS_DIR"
          printf '%s\n' \
            '[gd_resource type="EditorSettings" format=3]' \
            '' \
            '[resource]' \
            "export/android/android_sdk_path = \"$ANDROID_SDK_ROOT\"" \
            "export/android/java_sdk_path = \"$JAVA_HOME\"" \
            > "$SETTINGS_DIR/editor_settings-4.tres"

      - name: Set Android keystore env vars
        if: matrix.platform == 'android'
        env:
          RELEASE_USER: ${{ secrets.ANDROID_KEYSTORE_USER }}
          RELEASE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          # Godot 4.3+ reads keystore from GODOT_ANDROID_KEYSTORE_* env vars
          KS_USER="${RELEASE_USER:-$ANDROID_KEYSTORE_USER}"
          KS_PASS="${RELEASE_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
          echo "GODOT_ANDROID_KEYSTORE_RELEASE_PATH=$ANDROID_KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_RELEASE_USER=$KS_USER" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD=$KS_PASS" >> "$GITHUB_ENV"

      - name: Create build directory
        run: mkdir -p dist/build/${{ matrix.platform }}

      - name: Export ${{ matrix.preset }}
        run: godot --headless --export-release "${{ matrix.preset }}"
        timeout-minutes: 10

      - name: Ensure GDExtension binaries in export
        if: matrix.platform != 'macos' && matrix.platform != 'web'
        run: |
          BUILD_DIR="dist/build/${{ matrix.platform }}"
          case "${{ matrix.platform }}" in
            linux)       PLAT_KEY="linux.x86_64" ;;
            linux-arm64) PLAT_KEY="linux.arm64" ;;
            windows)     PLAT_KEY="windows.x86_64" ;;
            android)     PLAT_KEY="android.arm64" ;;
            *) exit 0 ;;
          esac
          echo "Checking GDExtension binaries for platform key: $PLAT_KEY"
          for gdext in $(find addons/ -name '*.gdextension' 2>/dev/null); do
            [ -f "$gdext" ] || continue
            echo "  Processing: $gdext"
            grep "$PLAT_KEY" "$gdext" | grep -o 'res://[^"]*' | while read -r res_path; do
              rel_path="${res_path#res://}"
              if [ -f "$rel_path" ] && [ ! -f "$BUILD_DIR/$rel_path" ]; then
                mkdir -p "$BUILD_DIR/$(dirname "$rel_path")"
                cp "$rel_path" "$BUILD_DIR/$rel_path"
                echo "    Copied: $rel_path"
              elif [ -f "$BUILD_DIR/$rel_path" ]; then
                echo "    Already present: $rel_path"
              fi
            done
          done

      - name: Inject godot-livekit dylibs into macOS export
        if: matrix.platform == 'macos' && env.LIVEKIT_DYLIB_STASH != ''
        run: |
          EXPORT_ZIP="dist/build/macos/daccord.zip"
          if [ ! -f "$EXPORT_ZIP" ]; then
            echo "::error::macOS export zip not found"
            exit 1
          fi
          WORK=$(mktemp -d)
          unzip -o "$EXPORT_ZIP" -d "$WORK"

          # Copy stashed LiveKit dylibs into the app bundle, mirroring the
          # res:// directory structure so Godot can resolve GDExtension paths.
          # Godot looks for res://addons/... under Contents/Frameworks/ on macOS.
          FW="$WORK/daccord.app/Contents/Frameworks"
          BIN="$FW/addons/godot-livekit/bin"
          mkdir -p "$BIN"
          cp "$LIVEKIT_DYLIB_STASH"/*.dylib "$BIN/"
          # Also copy arch-specific subdirectory dylibs (liblivekit, liblivekit_ffi)
          for subdir in "$LIVEKIT_DYLIB_STASH"/macos-*/; do
            [ -d "$subdir" ] || continue
            dirname=$(basename "$subdir")
            mkdir -p "$BIN/$dirname"
            cp "$subdir"*.dylib "$BIN/$dirname/"
          done
          echo "Injected dylibs into Contents/Frameworks/:"
          find "$FW" -name "*.dylib" -exec ls -lh {} \;

          # Ensure the exported app's Info.plist has the camera key so the
          # app itself doesn't crash on macOS 14+ when LiveKit loads
          PLIST="$WORK/daccord.app/Contents/Info.plist"
          if [ -f "$PLIST" ]; then
            /usr/libexec/PlistBuddy \
              -c "Add :NSCameraUseContinuityCameraDeviceType bool true" \
              "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy \
              -c "Set :NSCameraUseContinuityCameraDeviceType true" "$PLIST"
          fi

          # Ad-hoc sign each injected dylib so macOS doesn't reject them
          find "$FW" -name "*.dylib" -exec codesign --force --sign - {} \;

          # Verify every macOS dylib referenced in the .gdextension exists
          # in the app bundle at the path Godot will resolve at runtime.
          # res:// paths resolve under Contents/Frameworks/ on macOS.
          GDEXT="addons/godot-livekit/godot-livekit.gdextension"
          if [ -f "$GDEXT" ]; then
            MISSING=0
            # Only check lines containing "macos" — extract all res:// dylib paths
            grep 'macos' "$GDEXT" | grep -o 'res://[^"]*\.dylib' | while read -r res_url; do
              rel_path="${res_url#res://}"
              expected="$FW/$rel_path"
              if [ ! -f "$expected" ]; then
                echo "::error::Missing dylib in app bundle: $expected (from $GDEXT)"
                # Write to temp file since this runs in a subshell (pipe)
                echo 1 >> "$WORK/.dylib_missing"
              else
                echo "  OK: $expected"
              fi
            done
            if [ -f "$WORK/.dylib_missing" ]; then
              MISSING=$(wc -l < "$WORK/.dylib_missing" | tr -d ' ')
              echo "::error::$MISSING dylib(s) missing from app bundle — the app will crash on launch"
              exit 1
            fi
            echo "All GDExtension macOS dylibs verified in app bundle"
          fi

          # Re-package
          cd "$WORK"
          zip -r "$GITHUB_WORKSPACE/$EXPORT_ZIP" daccord.app
          cd "$GITHUB_WORKSPACE"
          rm -rf "$WORK"
          echo "macOS export updated with godot-livekit dylibs"

      - name: Inject lua-gdextension dylibs into macOS export
        if: matrix.platform == 'macos' && env.LUA_DYLIB_STASH != ''
        run: |
          EXPORT_ZIP="dist/build/macos/daccord.zip"
          WORK=$(mktemp -d)
          unzip -o "$EXPORT_ZIP" -d "$WORK"

          # Godot resolves res://addons/... under Contents/Frameworks/ on macOS
          FW="$WORK/daccord.app/Contents/Frameworks"
          BUILD="$FW/addons/lua-gdextension/build"
          mkdir -p "$BUILD"
          cp "$LUA_DYLIB_STASH"/*.dylib "$BUILD/"
          echo "Injected lua-gdextension dylibs into Contents/Frameworks/:"
          find "$BUILD" -name "*.dylib" -exec ls -lh {} \;

          # Ad-hoc sign each injected dylib
          find "$BUILD" -name "*.dylib" -exec codesign --force --sign - {} \;

          # Re-package
          cd "$WORK"
          zip -r "$GITHUB_WORKSPACE/$EXPORT_ZIP" daccord.app
          cd "$GITHUB_WORKSPACE"
          rm -rf "$WORK"
          echo "macOS export updated with lua-gdextension dylibs"

      - name: Verify addon binaries in build
        if: matrix.platform != 'web'
        run: |
          BUILD_DIR="dist/build/${{ matrix.platform }}"
          case "${{ matrix.platform }}" in
            linux)       PLAT_KEY="linux.x86_64" ;;
            linux-arm64) PLAT_KEY="linux.arm64" ;;
            windows)     PLAT_KEY="windows.x86_64" ;;
            macos)       PLAT_KEY="macos" ;;
            android)     PLAT_KEY="android.arm64" ;;
            *) exit 0 ;;
          esac
          echo "Verifying GDExtension binaries for ${{ matrix.platform }} (key: $PLAT_KEY)"
          for gdext in $(find addons/ -name '*.gdextension' 2>/dev/null); do
            [ -f "$gdext" ] || continue
            if [ "${{ matrix.platform }}" = "macos" ]; then
              # macOS binaries are injected into the zip — verified by inject steps
              continue
            fi
            grep "$PLAT_KEY" "$gdext" | grep -o 'res://[^"]*' | while read -r res_path; do
              rel_path="${res_path#res://}"
              if [ ! -f "$BUILD_DIR/$rel_path" ]; then
                echo "::error::Missing addon binary in build: $rel_path"
                echo 1 >> /tmp/.addon_missing
              else
                echo "  OK: $rel_path ($(du -h "$BUILD_DIR/$rel_path" | cut -f1))"
              fi
            done
          done
          if [ -f /tmp/.addon_missing ]; then
            COUNT=$(wc -l < /tmp/.addon_missing | tr -d ' ')
            echo "::error::$COUNT addon binary(ies) missing from ${{ matrix.platform }} build — release would be broken"
            exit 1
          fi
          echo "All addon binaries verified in ${{ matrix.platform }} build"

      - name: Remove duplicate GDExtension DLLs from Windows root
        if: matrix.platform == 'windows'
        run: |
          BUILD_DIR="dist/build/windows"
          # Godot copies GDExtension libraries to the exe directory during export,
          # but they are already in addons/ where the GDExtension system loads them.
          # Only dependency DLLs (livekit_ffi, livekit) need to be next to the exe
          # for the Windows DLL loader. Remove the duplicated main libraries.
          for gdext in $(find addons/ -name '*.gdextension' 2>/dev/null); do
            [ -f "$gdext" ] || continue
            grep "windows.x86_64" "$gdext" | grep -v '^\[' | grep -v '{' | grep -o 'res://[^"]*' | while read -r res_path; do
              rel_path="${res_path#res://}"
              basename=$(basename "$rel_path")
              if [ -f "$BUILD_DIR/$basename" ] && [ -f "$BUILD_DIR/$rel_path" ]; then
                rm "$BUILD_DIR/$basename"
                echo "  Removed duplicate from root: $basename (kept in $rel_path)"
              fi
            done
          done

      - name: Copy ANGLE DLLs into Windows build
        if: matrix.platform == 'windows'
        run: |
          BUILD_DIR="dist/build/windows"
          # GodotLite templates don't include ANGLE DLLs, so copy them from
          # the stock Godot export templates installed by setup-godot.
          GODOT_TPL_VERSION="${GODOT_VERSION%.*}"
          TPL_DIR="$HOME/.local/share/godot/export_templates/${GODOT_TPL_VERSION}.stable"
          for dll in libEGL.dll libGLESv2.dll; do
            if [ -f "$BUILD_DIR/$dll" ]; then
              echo "  Already present: $dll"
            elif [ -f "$TPL_DIR/$dll" ]; then
              cp "$TPL_DIR/$dll" "$BUILD_DIR/$dll"
              echo "  Copied from stock templates: $dll ($(du -h "$BUILD_DIR/$dll" | cut -f1))"
            else
              echo "::error::ANGLE DLL not found in build or stock templates: $dll"
              echo "  Searched: $TPL_DIR"
              ls -la "$TPL_DIR"/*.dll 2>/dev/null || echo "  No DLLs in template dir"
              exit 1
            fi
          done
          echo "ANGLE DLLs ready in Windows build"

      - name: Package Linux
        if: startsWith(matrix.platform, 'linux')
        run: |
          cd dist/build/${{ matrix.platform }}
          # Include .desktop file and icon for Linux packages
          cp ../../../dist/daccord.desktop . 2>/dev/null || true
          cp ../../../assets/icons/icon_128x128.png daccord.png 2>/dev/null || true
          tar czf ../../../${{ matrix.artifact }}.tar.gz *

      - name: Package Windows
        if: matrix.platform == 'windows'
        run: |
          cd dist/build/windows
          zip -r ../../../${{ matrix.artifact }}.zip *

      - name: Sign Windows executable
        if: matrix.platform == 'windows' && env.WINDOWS_CERT_BASE64 != ''
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          sudo apt-get install -y osslsigncode
          echo "$WINDOWS_CERT_BASE64" | base64 -d > cert.pfx
          # Re-extract, sign, re-package
          mkdir -p signed_windows
          cd signed_windows
          unzip ../daccord-windows-x86_64.zip
          osslsigncode sign \
            -pkcs12 ../cert.pfx \
            -pass "$WINDOWS_CERT_PASSWORD" \
            -n "daccord" \
            -t http://timestamp.digicert.com \
            -in daccord.exe \
            -out daccord_signed.exe
          mv daccord_signed.exe daccord.exe
          zip -r ../daccord-windows-x86_64.zip *
          cd ..
          rm -f cert.pfx
          rm -rf signed_windows

      - name: Package Android
        if: matrix.platform == 'android'
        run: |
          cp dist/build/android/daccord.apk ${{ matrix.artifact }}.apk

      - name: Bundle web JS dependencies
        if: matrix.platform == 'web'
        run: |
          # Download livekit-client UMD bundle for voice/video
          curl -fSL --retry 3 -o dist/build/web/livekit-client.umd.min.js \
            "https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"
          echo "livekit-client: $(wc -c < dist/build/web/livekit-client.umd.min.js | tr -d ' ') bytes"
          # Copy godot-livekit web wrapper and COOP/COEP service worker
          cp dist/web/godot-livekit-web.js dist/build/web/
          cp dist/web/coop_coep.js dist/build/web/
          # Copy Sentry JS wrapper for web crash reporting
          cp dist/web/daccord-sentry.js dist/build/web/
          echo "Web JS dependencies bundled:"
          ls -lh dist/build/web/*.js

      - name: Package Web
        if: matrix.platform == 'web'
        run: |
          cd dist/build/web
          zip -r ../../../${{ matrix.artifact }}.zip .

      - name: Package macOS
        if: matrix.platform == 'macos'
        run: |
          cp dist/build/macos/daccord.zip ${{ matrix.artifact }}.zip

      - name: Sign macOS app bundle
        if: matrix.platform == 'macos' && env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_IDENTITY: ${{ secrets.APPLE_IDENTITY }}
        run: |
          # Import certificate into a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 -d > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Unzip, sign, re-zip
          mkdir -p $RUNNER_TEMP/macos_app
          unzip -o ${{ matrix.artifact }}.zip -d $RUNNER_TEMP/macos_app
          codesign --deep --force --options runtime \
            --sign "$APPLE_IDENTITY" \
            $RUNNER_TEMP/macos_app/daccord.app
          cd $RUNNER_TEMP/macos_app
          zip -r $GITHUB_WORKSPACE/${{ matrix.artifact }}.zip daccord.app
          cd $GITHUB_WORKSPACE

          # Cleanup
          rm -f $RUNNER_TEMP/cert.p12
          security delete-keychain "$KEYCHAIN_PATH"

      - name: Notarize macOS app
        if: matrix.platform == 'macos' && env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit ${{ matrix.artifact }}.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the notarization ticket
          mkdir -p $RUNNER_TEMP/macos_staple
          unzip -o ${{ matrix.artifact }}.zip -d $RUNNER_TEMP/macos_staple
          xcrun stapler staple $RUNNER_TEMP/macos_staple/daccord.app
          cd $RUNNER_TEMP/macos_staple
          zip -r $GITHUB_WORKSPACE/${{ matrix.artifact }}.zip daccord.app
          cd $GITHUB_WORKSPACE
          rm -rf $RUNNER_TEMP/macos_staple

      - name: Create macOS DMGs
        if: matrix.platform == 'macos'
        run: |
          TMPDIR="$RUNNER_TEMP/dmg_build"
          rm -rf "$TMPDIR"
          mkdir -p "$TMPDIR"
          unzip -o ${{ matrix.artifact }}.zip -d "$TMPDIR"
          ln -s /Applications "$TMPDIR/Applications"
          # Build is universal (arm64 + x86_64) — create arch-specific DMGs
          # so download links for both architectures resolve
          hdiutil create \
            -volname "daccord" \
            -srcfolder "$TMPDIR" \
            -ov -format UDZO \
            "$GITHUB_WORKSPACE/daccord-macos-arm64.dmg"
          cp "$GITHUB_WORKSPACE/daccord-macos-arm64.dmg" \
            "$GITHUB_WORKSPACE/daccord-macos-x86_64.dmg"
          rm -rf "$TMPDIR"

      - name: Verify packaged artifact contains addon binaries
        run: |
          case "${{ matrix.platform }}" in
            linux|linux-arm64)
              PLAT_KEY="${{ matrix.platform == 'linux' && 'linux.x86_64' || 'linux.arm64' }}"
              ARCHIVE="${{ matrix.artifact }}.tar.gz"
              LIST_CMD="tar tzf"
              ;;
            windows)
              PLAT_KEY="windows.x86_64"
              ARCHIVE="${{ matrix.artifact }}.zip"
              LIST_CMD="unzip -l"
              ;;
            macos)
              PLAT_KEY="macos"
              ARCHIVE="${{ matrix.artifact }}.zip"
              LIST_CMD="unzip -l"
              ;;
            android)
              PLAT_KEY="android.arm64"
              ARCHIVE="${{ matrix.artifact }}.apk"
              LIST_CMD="unzip -l"
              ;;
            web)
              # Verify web JS dependencies are in the zip
              ARCHIVE="${{ matrix.artifact }}.zip"
              MISSING=0
              for js in livekit-client.umd.min.js godot-livekit-web.js coop_coep.js daccord-sentry.js; do
                if ! unzip -l "$ARCHIVE" | grep -q "$js"; then
                  echo "::error::Missing JS dependency in web archive: $js"
                  MISSING=$((MISSING + 1))
                else
                  echo "  OK: $js"
                fi
              done
              if [ "$MISSING" -gt 0 ]; then
                echo "::error::$MISSING JS file(s) missing from web archive"
                exit 1
              fi
              echo "All web JS dependencies verified in archive"
              exit 0
              ;;
          esac

          echo "Inspecting $ARCHIVE for $PLAT_KEY addon binaries..."
          MISSING=0
          for gdext in $(find addons/ -name '*.gdextension' 2>/dev/null); do
            [ -f "$gdext" ] || continue
            grep "$PLAT_KEY" "$gdext" | grep -o 'res://[^"]*' | while read -r res_path; do
              rel_path="${res_path#res://}"
              # For macOS, binaries are inside daccord.app/Contents/Frameworks/
              if [ "${{ matrix.platform }}" = "macos" ]; then
                search_path="daccord.app/Contents/Frameworks/$rel_path"
              else
                search_path="$rel_path"
              fi
              # Check for the file path (basename match for tar, path for zip)
              if ! $LIST_CMD "$ARCHIVE" 2>/dev/null | grep -q "$(basename "$rel_path")"; then
                echo "::error::Addon binary missing from $ARCHIVE: $rel_path"
                echo 1 >> /tmp/.pkg_missing
              else
                echo "  OK: $rel_path"
              fi
            done
          done
          if [ -f /tmp/.pkg_missing ]; then
            COUNT=$(wc -l < /tmp/.pkg_missing | tr -d ' ')
            echo "::error::$COUNT addon binary(ies) missing from packaged artifact — users will get a broken release"
            echo "Archive contents:"
            $LIST_CMD "$ARCHIVE" 2>/dev/null | head -50
            exit 1
          fi
          echo "All addon binaries verified in $ARCHIVE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.*
            daccord-macos-arm64.dmg
            daccord-macos-x86_64.dmg

  windows-installer:
    name: Build Windows installer
    needs: build
    runs-on: blacksmith-4vcpu-windows-2025
    environment: default
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows build artifact
        uses: actions/download-artifact@v4
        with:
          name: daccord-windows-x86_64
          path: .

      - name: Extract Windows build
        run: |
          mkdir -p dist/build/windows
          Expand-Archive -Path daccord-windows-x86_64.zip -DestinationPath dist/build/windows
        shell: pwsh

      - name: Verify addon binaries in installer input
        run: |
          $missing = 0
          $requiredDlls = @(
            "addons\godot-livekit\bin\libgodot-livekit.windows.x86_64.dll",
            "addons\godot-livekit\bin\livekit_ffi.dll",
            "addons\godot-livekit\bin\livekit.dll",
            "libEGL.dll",
            "libGLESv2.dll"
          )
          foreach ($dll in $requiredDlls) {
            $path = "dist\build\windows\$dll"
            if (Test-Path $path) {
              $size = (Get-Item $path).Length / 1KB
              Write-Host "  OK: $dll ($([math]::Round($size))KB)"
            } else {
              Write-Host "::error::Missing addon binary for installer: $dll"
              $missing++
            }
          }
          # Also check for lua-gdextension if present
          $luaDlls = Get-ChildItem -Path "dist\build\windows\addons\lua-gdextension" -Filter "*.dll" -Recurse -ErrorAction SilentlyContinue
          if ($luaDlls) {
            foreach ($dll in $luaDlls) {
              Write-Host "  OK: $($dll.FullName.Replace("$PWD\", ''))"
            }
          }
          if ($missing -gt 0) {
            Write-Host "::error::$missing addon binary(ies) missing — installer would ship a broken build"
            exit 1
          }
          Write-Host "All addon binaries present for installer"
        shell: pwsh

      - name: Get version from project.godot
        id: version
        run: |
          $ver = (Select-String -Path project.godot -Pattern 'config/version="([^"]+)"').Matches.Groups[1].Value
          echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Install Inno Setup
        run: |
          choco install innosetup -y --no-progress
        shell: cmd

      - name: Compile installer with Inno Setup
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ steps.version.outputs.APP_VERSION }}" dist\installer.iss
        shell: cmd

      - name: Sign installer
        if: env.WINDOWS_CERT_BASE64 != ''
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64)
          [IO.File]::WriteAllBytes("cert.pfx", $certBytes)
          & signtool sign /f cert.pfx /p $env:WINDOWS_CERT_PASSWORD /t http://timestamp.digicert.com /d "daccord" dist\daccord-windows-x86_64-setup.exe
          Remove-Item cert.pfx
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: daccord-windows-x86_64-setup
          path: dist/daccord-windows-x86_64-setup.exe

  release:
    name: Create Release
    needs: [build, windows-installer]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: daccord-*
          merge-multiple: true

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{found=0} found" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${TAG}"
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/*

