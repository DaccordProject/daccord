name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

env:
  GODOT_VERSION: "4.5.0"
  GODOTLITE_TAG: "v4.5"
  GUT_VERSION: "9.5.0"

jobs:
  lint:
    name: Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gdtoolkit
        run: pip install gdtoolkit

      - name: Run gdlint
        run: gdlint scripts/ scenes/

      - name: Code complexity analysis
        if: always()
        run: |
          output=$(gdradon cc scripts/ scenes/ 2>&1 || true)
          high=$(echo "$output" | grep -cE "^\s+F.*- [C-F] \(" || true)
          if [ "$high" -gt 0 ]; then
            echo "::warning::$high functions with high cyclomatic complexity (grade C-F)"
            echo "## Code Complexity" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$output" | grep -E "^\s+F.*- [C-F] \(" | head -20 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  test:
    name: Unit Tests
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: default
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install audio libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libasound2-dev libpulse-dev libopus-dev libpipewire-0.3-dev

      - name: Install godot-livekit addon (latest release)
        run: |
          TMPDIR=$(mktemp -d)
          gh release download --repo NodotProject/godot-livekit \
            --pattern "godot-livekit-release.zip" --dir "$TMPDIR"
          unzip -o "$TMPDIR/godot-livekit-release.zip" -d "$TMPDIR/extracted"
          rm -rf addons/godot-livekit
          cp -R "$TMPDIR/extracted/addons/godot-livekit" addons/godot-livekit
          rm -rf "$TMPDIR"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cache GUT
        uses: actions/cache@v4
        with:
          path: addons/gut
          key: gut-${{ env.GUT_VERSION }}

      - name: Install GUT
        run: |
          if [ ! -d addons/gut ]; then
            wget -q https://github.com/bitwes/Gut/archive/refs/tags/v${GUT_VERSION}.tar.gz -O /tmp/gut.tar.gz
            tar xzf /tmp/gut.tar.gz -C /tmp
            cp -r /tmp/Gut-${GUT_VERSION}/addons/gut addons/gut
            rm -rf /tmp/gut.tar.gz /tmp/Gut-${GUT_VERSION}
          fi


      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: false

      - name: Verify Godot
        run: godot --version

      - name: Cache Godot import
        uses: actions/cache@v4
        with:
          path: .godot/imported
          key: godot-import-${{ env.GODOT_VERSION }}-${{ github.sha }}
          restore-keys: |
            godot-import-${{ env.GODOT_VERSION }}-

      - name: Import project
        run: godot --headless --import .
        timeout-minutes: 2

      - name: Validate project startup
        run: |
          godot --headless --quit 2>&1 | tee /tmp/startup.log
          if grep -q "MainLoop type doesn't exist" /tmp/startup.log; then
            echo "::error::MainLoop type resolution failed"
            grep "MainLoop" /tmp/startup.log
            exit 1
          fi
        timeout-minutes: 1

      - name: Run unit tests
        run: |
          set -o pipefail
          godot --headless -s addons/gut/gut_cmdln.gd \
            -gexit \
            -ginclude_subdirs=true \
            -gprefix=test_ \
            -gsuffix=.gd \
            -glog=1 \
            -gdir=res://tests/unit \
            2>&1 | tee /tmp/gut_unit.txt
        timeout-minutes: 5

      - name: Run LiveKit tests (may crash without audio hardware)
        continue-on-error: true
        run: |
          set -o pipefail
          godot --headless -s addons/gut/gut_cmdln.gd \
            -gexit \
            -ginclude_subdirs=true \
            -gprefix=test_ \
            -gsuffix=.gd \
            -glog=1 \
            -gdir=res://tests/livekit \
            2>&1 | tee /tmp/gut_livekit.txt
        timeout-minutes: 5

      - name: Test result summary
        if: always()
        run: |
          for file in /tmp/gut_unit.txt /tmp/gut_livekit.txt; do
            if [ -f "$file" ]; then
              suite=$(basename "$file" .txt | sed 's/gut_//')
              echo "## ${suite} test results" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -E "(Passed|Failed|Pending|Orphans|Totals)" "$file" | tail -10 >> $GITHUB_STEP_SUMMARY || echo "No summary found" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          done

  integration-test:
    name: Integration Tests
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: default
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Checkout accordserver
        uses: actions/checkout@v4
        with:
          repository: DaccordProject/accordserver
          token: ${{ secrets.GH_PAT }}
          path: .accordserver_repo

      - name: Install audio libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libasound2-dev libpulse-dev libopus-dev libpipewire-0.3-dev

      - name: Install godot-livekit addon (latest release)
        run: |
          TMPDIR=$(mktemp -d)
          gh release download --repo NodotProject/godot-livekit \
            --pattern "godot-livekit-release.zip" --dir "$TMPDIR"
          unzip -o "$TMPDIR/godot-livekit-release.zip" -d "$TMPDIR/extracted"
          rm -rf addons/godot-livekit
          cp -R "$TMPDIR/extracted/addons/godot-livekit" addons/godot-livekit
          rm -rf "$TMPDIR"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cache GUT
        uses: actions/cache@v4
        with:
          path: addons/gut
          key: gut-${{ env.GUT_VERSION }}

      - name: Install GUT
        run: |
          if [ ! -d addons/gut ]; then
            wget -q https://github.com/bitwes/Gut/archive/refs/tags/v${GUT_VERSION}.tar.gz -O /tmp/gut.tar.gz
            tar xzf /tmp/gut.tar.gz -C /tmp
            cp -r /tmp/Gut-${GUT_VERSION}/addons/gut addons/gut
            rm -rf /tmp/gut.tar.gz /tmp/Gut-${GUT_VERSION}
          fi


      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up sccache
        id: sccache
        uses: mozilla-actions/sccache-action@v0.0.7
        continue-on-error: true

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            .accordserver_repo/target
          key: ${{ runner.os }}-cargo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build accordserver
        run: |
          if ! cargo build --release --features test-seed --manifest-path .accordserver_repo/Cargo.toml; then
            echo "::warning::Build failed with sccache, retrying without it"
            RUSTC_WRAPPER="" SCCACHE_GHA_ENABLED="false" \
              cargo build --release --features test-seed --manifest-path .accordserver_repo/Cargo.toml
          fi
        env:
          RUSTC_WRAPPER: ${{ steps.sccache.outcome == 'success' && 'sccache' || '' }}
          SCCACHE_GHA_ENABLED: ${{ steps.sccache.outcome == 'success' && 'true' || 'false' }}

      - name: Start accordserver
        run: |
          ACCORD_TEST_MODE=true \
          DATABASE_URL="sqlite:accord_ci_test.db?mode=rwc" \
          .accordserver_repo/target/release/accordserver > test_server.log 2>&1 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for server readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:39099/api/v1/gateway > /dev/null 2>&1; then
              echo "Server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Server failed to start within 30 seconds"
          cat test_server.log
          exit 1
        timeout-minutes: 1

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: false

      - name: Cache Godot import
        uses: actions/cache@v4
        with:
          path: .godot/imported
          key: godot-import-${{ env.GODOT_VERSION }}-${{ github.sha }}
          restore-keys: |
            godot-import-${{ env.GODOT_VERSION }}-

      - name: Import project
        run: godot --headless --import .
        timeout-minutes: 2

      - name: Validate project startup
        run: |
          godot --headless --quit 2>&1 | tee /tmp/startup.log
          if grep -q "MainLoop type doesn't exist" /tmp/startup.log; then
            echo "::error::MainLoop type resolution failed"
            grep "MainLoop" /tmp/startup.log
            exit 1
          fi
        timeout-minutes: 1

      - name: Run AccordKit unit tests
        run: |
          set -o pipefail
          godot --headless -s addons/gut/gut_cmdln.gd \
            -gexit \
            -ginclude_subdirs=true \
            -gprefix=test_ \
            -gsuffix=.gd \
            -glog=1 \
            -gdir=res://tests/accordkit/unit \
            2>&1 | tee /tmp/gut_ak_unit.txt
        timeout-minutes: 5

      - name: Run REST integration tests
        run: |
          set -o pipefail
          godot --headless -s addons/gut/gut_cmdln.gd \
            -gexit \
            -ginclude_subdirs=true \
            -gprefix=test_ \
            -gsuffix=.gd \
            -glog=1 \
            -gdir=res://tests/accordkit/integration \
            2>&1 | tee /tmp/gut_ak_rest.txt
        timeout-minutes: 5

      - name: Run Client API tests
        run: |
          # Kill any stale process on port 39100
          fuser -k 39100/tcp 2>/dev/null || true
          sleep 1

          # Start Daccord with test API enabled
          godot --headless --test-api --test-api-port 39100 \
            --test-api-no-auth --test-api-verbose &
          DACCORD_PID=$!
          echo "DACCORD_PID=$DACCORD_PID" >> $GITHUB_ENV

          # Wait for test API readiness
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:39100/api/get_state \
                 -X POST -d '{}' > /dev/null 2>&1; then
              echo "Test API is ready"
              break
            fi
            if ! kill -0 "$DACCORD_PID" 2>/dev/null; then
              echo "::error::Daccord exited before test API was ready"
              exit 1
            fi
            sleep 1
          done

          # Run bash test scripts
          failed=0
          for test_script in tests/client_api/test_*.sh; do
            test_name="$(basename "$test_script")"
            echo "--- Running: $test_name ---"
            if CLIENT_API_URL="http://127.0.0.1:39100/api" \
               bash "$test_script"; then
              echo "PASS: $test_name"
            else
              echo "::error::FAIL: $test_name"
              failed=$((failed + 1))
            fi
          done

          # Stop Daccord
          curl -sf http://127.0.0.1:39100/api/quit \
            -X POST -d '{}' > /dev/null 2>&1 || true
          sleep 1
          kill "$DACCORD_PID" 2>/dev/null || true
          wait "$DACCORD_PID" 2>/dev/null || true

          if [ $failed -gt 0 ]; then
            echo "::error::$failed client API test(s) failed"
            exit 1
          fi
          echo "All client API tests passed"
        timeout-minutes: 5

      - name: Test result summary
        if: always()
        run: |
          for file in /tmp/gut_ak_unit.txt /tmp/gut_ak_rest.txt; do
            if [ -f "$file" ]; then
              suite=$(basename "$file" .txt | sed 's/gut_ak_//')
              echo "## AccordKit ${suite} test results" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -E "(Passed|Failed|Pending|Orphans|Totals)" "$file" | tail -10 >> $GITHUB_STEP_SUMMARY || echo "No summary found" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Stop accordserver
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill "$SERVER_PID" 2>/dev/null || true
          fi

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accordserver-log
          path: test_server.log
          if-no-files-found: ignore

  godotlite-validation:
    name: GodotLite Export Validation
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: default
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libasound2-dev libpulse-dev libopus-dev libpipewire-0.3-dev libpipewire-0.3-dev

      - name: Install godot-livekit addon (latest release)
        run: |
          TMPDIR=$(mktemp -d)
          gh release download --repo NodotProject/godot-livekit \
            --pattern "godot-livekit-release.zip" --dir "$TMPDIR"
          unzip -o "$TMPDIR/godot-livekit-release.zip" -d "$TMPDIR/extracted"
          rm -rf addons/godot-livekit
          cp -R "$TMPDIR/extracted/addons/godot-livekit" addons/godot-livekit
          rm -rf "$TMPDIR"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cache GUT
        uses: actions/cache@v4
        with:
          path: addons/gut
          key: gut-${{ env.GUT_VERSION }}

      - name: Install GUT
        run: |
          if [ ! -d addons/gut ]; then
            wget -q https://github.com/bitwes/Gut/archive/refs/tags/v${GUT_VERSION}.tar.gz -O /tmp/gut.tar.gz
            tar xzf /tmp/gut.tar.gz -C /tmp
            cp -r /tmp/Gut-${GUT_VERSION}/addons/gut addons/gut
            rm -rf /tmp/gut.tar.gz /tmp/Gut-${GUT_VERSION}
          fi


      - name: Verify all addons installed
        run: |
          failed=0
          for addon in godot-livekit gut; do
            if [ ! -d "addons/$addon" ]; then
              echo "::error::Required addon missing: addons/$addon"
              failed=1
            else
              echo "OK: addons/$addon"
            fi
          done
          # List all GDExtension files that will be included
          echo "GDExtension files:"
          find addons/ -name '*.gdextension' -exec echo "  {}" \;
          exit $failed

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Download GodotLite template
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/templates
          ASSET="godotlite-${GODOTLITE_TAG}-linux-x86_64"
          DEST="dist/templates/godot.linuxbsd.template_release.x86_64"
          gh release download "${GODOTLITE_TAG}" \
            --repo NodotProject/GodotLite \
            --pattern "${ASSET}" \
            --dir dist/templates
          mv "dist/templates/${ASSET}" "${DEST}"
          chmod +x "${DEST}"
          echo "GodotLite template installed: ${DEST} ($(du -h "${DEST}" | cut -f1))"

      - name: Cache Godot import
        uses: actions/cache@v4
        with:
          path: .godot/imported
          key: godot-import-${{ env.GODOT_VERSION }}-godotlite-${{ github.sha }}
          restore-keys: |
            godot-import-${{ env.GODOT_VERSION }}-godotlite-

      - name: Import project
        run: godot --headless --import .
        timeout-minutes: 2

      - name: Export with GodotLite template
        run: |
          mkdir -p dist/build/linux
          godot --headless --export-release "Linux" 2>&1 | tee /tmp/export.log
          if [ ! -f dist/build/linux/daccord.x86_64 ]; then
            echo "::error::GodotLite export failed — binary not produced"
            cat /tmp/export.log
            exit 1
          fi
          echo "Export successful: $(du -h dist/build/linux/daccord.x86_64 | cut -f1)"
          echo "Build directory contents:"
          ls -lah dist/build/linux/
        timeout-minutes: 5

      - name: Ensure GDExtension binaries in export
        run: |
          BUILD_DIR="dist/build/linux"
          PLAT_KEY="linux.x86_64"
          echo "Checking GDExtension binaries for Linux..."
          for gdext in $(find addons/ -name '*.gdextension' 2>/dev/null); do
            [ -f "$gdext" ] || continue
            echo "  Processing: $gdext"
            grep "$PLAT_KEY" "$gdext" | grep -o 'res://[^"]*' | while read -r res_path; do
              rel_path="${res_path#res://}"
              if [ -f "$rel_path" ] && [ ! -f "$BUILD_DIR/$rel_path" ]; then
                mkdir -p "$BUILD_DIR/$(dirname "$rel_path")"
                cp "$rel_path" "$BUILD_DIR/$rel_path"
                echo "    Copied: $rel_path"
              elif [ -f "$BUILD_DIR/$rel_path" ]; then
                echo "    Already present: $rel_path"
              fi
            done
          done

      - name: Verify addon binaries in build
        run: |
          BUILD_DIR="dist/build/linux"
          PLAT_KEY="linux.x86_64"
          echo "Verifying addon binaries for Linux..."
          for gdext in $(find addons/ -name '*.gdextension' 2>/dev/null); do
            [ -f "$gdext" ] || continue
            grep "$PLAT_KEY" "$gdext" | grep -o 'res://[^"]*' | while read -r res_path; do
              rel_path="${res_path#res://}"
              if [ ! -f "$BUILD_DIR/$rel_path" ]; then
                echo "::error::Missing addon binary in Linux build: $rel_path"
                echo 1 >> /tmp/.addon_missing
              else
                echo "  OK: $rel_path ($(du -h "$BUILD_DIR/$rel_path" | cut -f1))"
              fi
            done
          done
          if [ -f /tmp/.addon_missing ]; then
            COUNT=$(wc -l < /tmp/.addon_missing | tr -d ' ')
            echo "::error::$COUNT addon binary(ies) missing from Linux build — release would be broken"
            exit 1
          fi
          echo "All addon binaries verified in Linux build"

      - name: Validate GodotLite binary starts
        run: |
          cd dist/build/linux
          chmod +x daccord.x86_64
          timeout 30 ./daccord.x86_64 --headless --quit 2>&1 | tee /tmp/godotlite_startup.log || true
          # Check for fatal errors that indicate stripped engine modules
          if grep -qiE "MainLoop type doesn't exist|SCRIPT ERROR|Cannot open file|Failed loading resource|Can't open dynamic library|GDExtension dynamic library not found" /tmp/godotlite_startup.log; then
            echo "::error::GodotLite binary failed startup validation"
            echo "## GodotLite Startup Errors" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -iE "ERROR|SCRIPT ERROR|Cannot open|Failed loading|MainLoop|doesn't exist" /tmp/godotlite_startup.log >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "GodotLite binary started and quit successfully"
        timeout-minutes: 1

  web-export:
    name: Web Export & Chrome Smoke Test
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: default
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libasound2-dev libpulse-dev libopus-dev libpipewire-0.3-dev \
            chromium-browser python3

      - name: Install godot-livekit addon (latest release)
        run: |
          TMPDIR=$(mktemp -d)
          gh release download --repo NodotProject/godot-livekit \
            --pattern "godot-livekit-release.zip" --dir "$TMPDIR"
          unzip -o "$TMPDIR/godot-livekit-release.zip" -d "$TMPDIR/extracted"
          rm -rf addons/godot-livekit
          cp -R "$TMPDIR/extracted/addons/godot-livekit" addons/godot-livekit
          rm -rf "$TMPDIR"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cache GUT
        uses: actions/cache@v4
        with:
          path: addons/gut
          key: gut-${{ env.GUT_VERSION }}

      - name: Install GUT
        run: |
          if [ ! -d addons/gut ]; then
            wget -q https://github.com/bitwes/Gut/archive/refs/tags/v${GUT_VERSION}.tar.gz -O /tmp/gut.tar.gz
            tar xzf /tmp/gut.tar.gz -C /tmp
            cp -r /tmp/Gut-${GUT_VERSION}/addons/gut addons/gut
            rm -rf /tmp/gut.tar.gz /tmp/Gut-${GUT_VERSION}
          fi


      - name: Set up Godot (with web templates)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Cache Godot import
        uses: actions/cache@v4
        with:
          path: .godot/imported
          key: godot-import-web-${{ env.GODOT_VERSION }}-${{ github.sha }}
          restore-keys: |
            godot-import-web-${{ env.GODOT_VERSION }}-

      - name: Import project
        run: godot --headless --import .
        timeout-minutes: 2

      - name: Export Web build
        run: |
          mkdir -p dist/build/web
          godot --headless --export-release "Web" 2>&1 | tee /tmp/web_export.log
          if [ ! -f dist/build/web/Daccord.html ]; then
            echo "::error::Web export failed — Daccord.html not produced"
            cat /tmp/web_export.log
            exit 1
          fi
          echo "Web export artifacts:"
          ls -lah dist/build/web/
        timeout-minutes: 5

      - name: Validate web export artifacts
        run: |
          # Godot 4 web export must produce these files
          REQUIRED=(Daccord.html Daccord.js Daccord.wasm Daccord.pck)
          failed=0
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "dist/build/web/$f" ]; then
              echo "::error::Missing web export artifact: $f"
              failed=1
            else
              echo "OK: dist/build/web/$f ($(du -h dist/build/web/$f | cut -f1))"
            fi
          done
          exit $failed

      - name: Copy COOP/COEP service worker and Sentry JS into web build
        run: |
          cp dist/web/coop_coep.js dist/build/web/coop_coep.js
          echo "Service worker copied: $(du -h dist/build/web/coop_coep.js | cut -f1)"
          cp dist/web/daccord-sentry.js dist/build/web/daccord-sentry.js
          echo "Sentry JS copied: $(du -h dist/build/web/daccord-sentry.js | cut -f1)"

      - name: Start HTTP server with COOP/COEP headers
        run: |
          # Serve the web build with the isolation headers Chrome requires for
          # SharedArrayBuffer.  The service worker handles this at runtime, but
          # for the headless smoke test we inject the headers server-side so
          # Chrome can load the page without the worker bootstrap reload.
          cat > /tmp/coop_coep_server.py << 'PYEOF'
          import http.server, os, sys
          PORT = int(sys.argv[1]) if len(sys.argv) > 1 else 8060
          SERVE_DIR = sys.argv[2] if len(sys.argv) > 2 else "."
          class COOPCOEPHandler(http.server.SimpleHTTPRequestHandler):
              def __init__(self, *args, **kwargs):
                  super().__init__(*args, directory=SERVE_DIR, **kwargs)
              def end_headers(self):
                  self.send_header("Cross-Origin-Opener-Policy", "same-origin")
                  self.send_header("Cross-Origin-Embedder-Policy", "require-corp")
                  super().end_headers()
              def log_message(self, *args):
                  pass  # silence request logs
          httpd = http.server.HTTPServer(("127.0.0.1", PORT), COOPCOEPHandler)
          httpd.serve_forever()
          PYEOF
          python3 /tmp/coop_coep_server.py 8060 dist/build/web &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Wait for the server to be ready
          for i in $(seq 1 10); do
            if curl -sf http://127.0.0.1:8060/ > /dev/null 2>&1; then
              echo "HTTP server ready on :8060"
              break
            fi
            sleep 1
          done

      - name: Chrome headless smoke test
        run: |
          # Run Chrome headless and capture console output for 10 seconds.
          # A successful load prints the Godot engine start message; fatal
          # JS errors (e.g. missing SharedArrayBuffer, WASM load failure) are
          # captured and fail the step.
          CHROME=$(command -v chromium-browser || command -v chromium || command -v google-chrome || true)
          if [ -z "$CHROME" ]; then
            echo "::warning::No Chrome/Chromium found — skipping smoke test"
            exit 0
          fi
          "$CHROME" \
            --headless=new \
            --no-sandbox \
            --disable-dev-shm-usage \
            --disable-gpu \
            --remote-debugging-port=9222 \
            --enable-logging=stderr \
            --log-level=0 \
            "http://127.0.0.1:8060/Daccord.html" \
            > /tmp/chrome_stdout.txt 2> /tmp/chrome_stderr.txt &
          CHROME_PID=$!
          sleep 10
          kill $CHROME_PID 2>/dev/null || true
          echo "--- Chrome stderr (last 40 lines) ---"
          tail -40 /tmp/chrome_stderr.txt || true
          # Fail if Chrome logged a SharedArrayBuffer or WASM load error
          if grep -qiE "sharedarraybuffer|not allowed|wasm.*fail|cannot.*instantiate|cross-origin" \
               /tmp/chrome_stderr.txt /tmp/chrome_stdout.txt 2>/dev/null; then
            echo "::error::Chrome reported a COOP/COEP or WASM load error"
            echo "## Chrome Smoke Test Errors" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -iE "sharedarraybuffer|not allowed|wasm.*fail|cross-origin" \
              /tmp/chrome_stderr.txt /tmp/chrome_stdout.txt 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "Chrome smoke test passed"
        timeout-minutes: 3

      - name: Stop HTTP server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill "$SERVER_PID" 2>/dev/null || true
          fi

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-web-build
          path: dist/build/web/
          retention-days: 7

      - name: Web export summary
        if: always()
        run: |
          echo "## Web Export" >> $GITHUB_STEP_SUMMARY
          if [ -f dist/build/web/Daccord.html ]; then
            echo "Build artifacts:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            ls -lah dist/build/web/ >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Export failed — no artifacts produced." >> $GITHUB_STEP_SUMMARY
          fi

  windows-smoke-test:
    name: Windows Export & Smoke Test
    needs: lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: default
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install system libraries and Wine
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libasound2-dev libpulse-dev libopus-dev libpipewire-0.3-dev \
            wine64

      - name: Install godot-livekit addon (latest release)
        run: |
          TMPDIR=$(mktemp -d)
          gh release download --repo NodotProject/godot-livekit \
            --pattern "godot-livekit-release.zip" --dir "$TMPDIR"
          unzip -o "$TMPDIR/godot-livekit-release.zip" -d "$TMPDIR/extracted"
          rm -rf addons/godot-livekit
          cp -R "$TMPDIR/extracted/addons/godot-livekit" addons/godot-livekit
          rm -rf "$TMPDIR"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Cache GUT
        uses: actions/cache@v4
        with:
          path: addons/gut
          key: gut-${{ env.GUT_VERSION }}

      - name: Install GUT
        run: |
          if [ ! -d addons/gut ]; then
            wget -q https://github.com/bitwes/Gut/archive/refs/tags/v${GUT_VERSION}.tar.gz -O /tmp/gut.tar.gz
            tar xzf /tmp/gut.tar.gz -C /tmp
            cp -r /tmp/Gut-${GUT_VERSION}/addons/gut addons/gut
            rm -rf /tmp/gut.tar.gz /tmp/Gut-${GUT_VERSION}
          fi


      - name: Verify all addons installed
        run: |
          failed=0
          for addon in godot-livekit gut; do
            if [ ! -d "addons/$addon" ]; then
              echo "::error::Required addon missing: addons/$addon"
              failed=1
            else
              echo "OK: addons/$addon"
            fi
          done
          exit $failed

      - name: Set up Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Download GodotLite Windows template
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/templates
          ASSET="godotlite-${GODOTLITE_TAG}-windows-x86_64.exe"
          DEST="dist/templates/godot.windows.template_release.x86_64.exe"
          gh release download "${GODOTLITE_TAG}" \
            --repo NodotProject/GodotLite \
            --pattern "${ASSET}" \
            --dir dist/templates
          mv "dist/templates/${ASSET}" "${DEST}"
          echo "GodotLite Windows template installed: ${DEST} ($(du -h "${DEST}" | cut -f1))"

      - name: Cache Godot import
        uses: actions/cache@v4
        with:
          path: .godot/imported
          key: godot-import-${{ env.GODOT_VERSION }}-windows-${{ github.sha }}
          restore-keys: |
            godot-import-${{ env.GODOT_VERSION }}-windows-

      - name: Import project
        run: godot --headless --import .
        timeout-minutes: 2

      - name: Export Windows build
        run: |
          mkdir -p dist/build/windows
          godot --headless --export-release "Windows" 2>&1 | tee /tmp/win_export.log
          if [ ! -f dist/build/windows/daccord.exe ]; then
            echo "::error::Windows export failed — daccord.exe not produced"
            cat /tmp/win_export.log
            exit 1
          fi
          echo "Export successful: $(du -h dist/build/windows/daccord.exe | cut -f1)"
          echo "Build directory contents:"
          ls -lah dist/build/windows/
        timeout-minutes: 5

      - name: Ensure GDExtension binaries in export
        run: |
          BUILD_DIR="dist/build/windows"
          PLAT_KEY="windows.x86_64"
          echo "Checking GDExtension binaries for Windows..."
          for gdext in $(find addons/ -name '*.gdextension' 2>/dev/null); do
            [ -f "$gdext" ] || continue
            echo "  Processing: $gdext"
            grep "$PLAT_KEY" "$gdext" | grep -o 'res://[^"]*' | while read -r res_path; do
              rel_path="${res_path#res://}"
              if [ -f "$rel_path" ] && [ ! -f "$BUILD_DIR/$rel_path" ]; then
                mkdir -p "$BUILD_DIR/$(dirname "$rel_path")"
                cp "$rel_path" "$BUILD_DIR/$rel_path"
                echo "    Copied: $rel_path"
              elif [ -f "$BUILD_DIR/$rel_path" ]; then
                echo "    Already present: $rel_path"
              fi
            done
          done

      - name: Verify addon binaries in build
        run: |
          BUILD_DIR="dist/build/windows"
          PLAT_KEY="windows.x86_64"
          echo "Verifying addon binaries for Windows..."
          for gdext in $(find addons/ -name '*.gdextension' 2>/dev/null); do
            [ -f "$gdext" ] || continue
            grep "$PLAT_KEY" "$gdext" | grep -o 'res://[^"]*' | while read -r res_path; do
              rel_path="${res_path#res://}"
              if [ ! -f "$BUILD_DIR/$rel_path" ]; then
                echo "::error::Missing addon binary in Windows build: $rel_path"
                echo 1 >> /tmp/.addon_missing
              else
                echo "  OK: $rel_path ($(du -h "$BUILD_DIR/$rel_path" | cut -f1))"
              fi
            done
          done
          if [ -f /tmp/.addon_missing ]; then
            COUNT=$(wc -l < /tmp/.addon_missing | tr -d ' ')
            echo "::error::$COUNT addon binary(ies) missing from Windows build — release would be broken"
            exit 1
          fi
          echo "All addon binaries verified in Windows build"

      - name: Validate Windows binary starts (Wine)
        run: |
          cd dist/build/windows
          # Use Wine to run the Windows binary in headless mode
          timeout 30 wine64 daccord.exe --headless --quit 2>&1 | tee /tmp/wine_startup.log || true
          # Check for fatal errors that indicate broken export
          if grep -qiE "MainLoop type doesn't exist|SCRIPT ERROR|Cannot open file|Failed loading resource|Can't open dynamic library|GDExtension dynamic library not found" /tmp/wine_startup.log; then
            echo "::error::Windows binary failed startup validation under Wine"
            echo "## Windows Smoke Test Errors" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -iE "ERROR|SCRIPT ERROR|Cannot open|Failed loading|MainLoop|doesn't exist" /tmp/wine_startup.log >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "Windows binary started and quit successfully under Wine"
        timeout-minutes: 2

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-windows-build
          path: dist/build/windows/
          retention-days: 7

      - name: Windows smoke test summary
        if: always()
        run: |
          echo "## Windows Smoke Test" >> $GITHUB_STEP_SUMMARY
          if [ -f dist/build/windows/daccord.exe ]; then
            echo "Export successful:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            ls -lah dist/build/windows/ >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Export failed — no artifacts produced." >> $GITHUB_STEP_SUMMARY
          fi
