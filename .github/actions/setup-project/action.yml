name: Setup Daccord Project
description: >
  Install addons (godot-livekit, GUT, Sentry), set up Godot, and import the
  project.  Used by every CI and release job that needs a runnable Godot workspace.

inputs:
  godot-version:
    description: Godot version (e.g. "4.5.0")
    required: true
  gut-version:
    description: GUT framework version (e.g. "9.5.0")
    required: true
  sentry-version:
    description: Sentry SDK version (e.g. "1.3.2")
    required: true
  gh-token:
    description: github.token — used for public repo downloads
    required: true
  gh-pat:
    description: GH_PAT secret — used for Sentry private repo
    required: true
  include-templates:
    description: Install Godot export templates (needed for export jobs)
    default: "false"
  extra-packages:
    description: Additional apt packages to install on Linux (space-separated)
    default: ""
  cache-suffix:
    description: Suffix for import cache key (e.g. "web", "windows", "godotlite")
    default: ""
  lua-gdextension-version:
    description: Lua GDExtension version to install (empty = skip)
    default: ""
  import-strict:
    description: Fail the build if project import fails ("true" or "false")
    default: "true"

runs:
  using: composite
  steps:
    - name: Install system libraries
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update -qq
        PACKAGES="libasound2-dev libpulse-dev libopus-dev libpipewire-0.3-dev"
        if [ -n "${{ inputs.extra-packages }}" ]; then
          PACKAGES="$PACKAGES ${{ inputs.extra-packages }}"
        fi
        sudo apt-get install -y -qq $PACKAGES

    - name: Install godot-livekit addon (latest release)
      shell: bash
      run: |
        TMPDIR=$(mktemp -d)
        gh release download --repo NodotProject/godot-livekit \
          --pattern "godot-livekit-release.zip" --dir "$TMPDIR"
        unzip -o "$TMPDIR/godot-livekit-release.zip" -d "$TMPDIR/extracted"
        rm -rf addons/godot-livekit
        cp -R "$TMPDIR/extracted/addons/godot-livekit" addons/godot-livekit
        rm -rf "$TMPDIR"
      env:
        GH_TOKEN: ${{ inputs.gh-token }}

    - name: Cache GUT
      uses: actions/cache@v4
      with:
        path: addons/gut
        key: gut-${{ inputs.gut-version }}

    - name: Install GUT
      shell: bash
      run: |
        if [ ! -d addons/gut ]; then
          curl -sL https://github.com/bitwes/Gut/archive/refs/tags/v${{ inputs.gut-version }}.tar.gz -o /tmp/gut.tar.gz
          tar xzf /tmp/gut.tar.gz -C /tmp
          cp -r /tmp/Gut-${{ inputs.gut-version }}/addons/gut addons/gut
          rm -rf /tmp/gut.tar.gz /tmp/Gut-${{ inputs.gut-version }}
        fi

    - name: Cache Sentry SDK
      uses: actions/cache@v4
      with:
        path: addons/sentry
        key: sentry-godot-${{ inputs.sentry-version }}

    - name: Install Sentry SDK
      shell: bash
      run: |
        if [ ! -d addons/sentry ]; then
          gh release download ${{ inputs.sentry-version }} --repo getsentry/sentry-godot \
            --pattern "*.zip" --dir /tmp/sentry_dl
          unzip -o /tmp/sentry_dl/*.zip -d /tmp/sentry_extract
          cp -r /tmp/sentry_extract/addons/sentry addons/sentry
          rm -rf /tmp/sentry_dl /tmp/sentry_extract
        fi
      env:
        GH_TOKEN: ${{ inputs.gh-pat }}

    - name: Cache Lua GDExtension
      if: inputs.lua-gdextension-version != ''
      uses: actions/cache@v4
      with:
        path: addons/lua-gdextension
        key: lua-gdextension-lua-${{ inputs.lua-gdextension-version }}

    - name: Install Lua GDExtension
      if: inputs.lua-gdextension-version != ''
      shell: bash
      run: |
        if [ ! -d addons/lua-gdextension ]; then
          TMPDIR=$(mktemp -d)
          gh release download "${{ inputs.lua-gdextension-version }}" --repo gilzoide/lua-gdextension \
            --pattern "lua-gdextension.zip" --dir "$TMPDIR"
          unzip -o "$TMPDIR/lua-gdextension.zip" -d "$TMPDIR/extracted"
          cp -R "$TMPDIR/extracted/addons/lua-gdextension" addons/lua-gdextension
          rm -rf "$TMPDIR"
        fi
      env:
        GH_TOKEN: ${{ inputs.gh-token }}

    - name: Verify all addons installed
      shell: bash
      run: |
        failed=0
        for addon in godot-livekit gut sentry; do
          if [ ! -d "addons/$addon" ]; then
            echo "::error::Required addon missing: addons/$addon"
            failed=1
          else
            echo "OK: addons/$addon"
          fi
        done
        if [ -n "${{ inputs.lua-gdextension-version }}" ]; then
          if [ ! -d "addons/lua-gdextension" ]; then
            echo "::error::Required addon missing: addons/lua-gdextension"
            failed=1
          else
            echo "OK: addons/lua-gdextension"
          fi
        fi
        echo "GDExtension files:"
        find addons/ -name '*.gdextension' -exec echo "  {}" \;
        exit $failed

    - name: Set up Godot
      uses: chickensoft-games/setup-godot@v2
      with:
        version: ${{ inputs.godot-version }}
        use-dotnet: false
        include-templates: ${{ inputs.include-templates }}

    - name: Verify Godot
      shell: bash
      run: godot --version

    - name: Cache Godot import
      uses: actions/cache@v4
      with:
        path: .godot/imported
        key: godot-import-${{ inputs.godot-version }}${{ inputs.cache-suffix != '' && format('-{0}', inputs.cache-suffix) || '' }}-${{ github.sha }}
        restore-keys: |
          godot-import-${{ inputs.godot-version }}${{ inputs.cache-suffix != '' && format('-{0}', inputs.cache-suffix) || '' }}-

    - name: Import project
      shell: bash
      run: |
        if [ "${{ inputs.import-strict }}" = "true" ]; then
          timeout 120 godot --headless --import .
        else
          timeout 120 godot --headless --import . || true
        fi
